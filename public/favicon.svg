<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Vibrant blue to magenta-purple gradient -->
    <linearGradient id="brand-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00A3FF" />
      <stop offset="50%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#7C3AED" />
    </linearGradient>
    
    <!-- Mask to cut out the S-curve and the two dots -->
    <mask id="logo-mask">
      <!-- Everything white remains visible -->
      <rect width="512" height="512" fill="white" />
      
      <!-- S-curve cut out -->
      <path d="M 80 256 C 160 130, 210 130, 256 256 C 302 382, 352 382, 432 256" 
            fill="none" stroke="black" stroke-width="26" stroke-linecap="round" />
            
      <!-- Two dots cut out -->
      <circle cx="176" cy="216" r="22" fill="black" />
      <circle cx="336" cy="296" r="22" fill="black" />
    </mask>
  </defs>

  <!-- The rounded diamond shape -->
  <rect x="121" y="121" width="270" height="270" rx="76" 
        transform="rotate(45 256 256)" 
        fill="url(#brand-grad)" 
        mask="url(#logo-mask)" />
</svg>
